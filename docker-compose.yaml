services:
  api:
    build: ./api
    pull_policy: build
    networks:
      - distributed-network
    deploy: 
      replicas: 3
    depends_on:
      mongodb:
        condition: service_healthy

  nginx:
    container_name: nginx-server
    image: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports: 
      - "8080:80"
    depends_on:
      - api
    networks:
      - distributed-network 

  mongodb: # Port from cloud-hosted Atlas to local hosted container done with help from Gemini 3 Pro 
    container_name: mongodb
    image: mongo:latest
    restart: unless-stopped
    networks:
      - distributed-network
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./mongodb/data:/data/db 
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  broker:
    image: apache/kafka:latest
    hostname: broker
    container_name: broker
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:29092,EXTERNAL://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - distributed-network
    restart: unless-stopped
  
  notifications:
    build: ./email-service
    container_name: notifications
    pull_policy: build
    ports:
      - 8888:8888
    networks:
      - distributed-network


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports: 
      - 9090:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/prometheus_data:/prometheus:rw
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - distributed-network
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
     - 3333:3000
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - distributed-network
    restart: unless-stopped
    depends_on:
      - prometheus

  mongodb-exporter:
    image: percona/mongodb_exporter:0.48.0
    container_name: mongodb-exporter
    ports:
      - 9216:9216
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/?authSource=admin
    command:
      - '--compatible-mode'
      - '--collect-all'
    networks:
      - distributed-network
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: nginx-exporter
    ports:
      - 9113:9113
    command:
      - '-nginx.scrape-uri=http://nginx:8080/basic_status'
    networks:
      - distributed-network
    restart: unless-stopped
    depends_on:
      - nginx
    
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - 9308:9308
    command:
      - '--kafka.server=broker:29092'
    networks:
      - distributed-network
    restart: unless-stopped
    depends_on:
      - broker

volumes:
  mongodb_data:
    driver: local

networks:
  distributed-network:



