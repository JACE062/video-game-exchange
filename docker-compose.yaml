services:
  api:
    build: ./api
    pull_policy: build
    networks:
      - distributed-network
    deploy: 
      replicas: 3
    depends_on:
      mongo-init:
        condition: service_completed_successfully

  nginx:
    container_name: nginx-server
    image: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports: 
      - "8080:80"
    depends_on:
      - api
    networks:
      - distributed-network 

  # Mongo replication setup/configuration done with help from Gemini 3 Pro
  mongo1:
    container_name: mongo1
    image: mongo:latest
    restart: unless-stopped
    networks:
      - distributed-network
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb/data1:/data/db
    command: >
      bash -c 'echo "dGhpc2lzYWZha2VrZXlmb3Jsb2NhbGRldmVsb3BtZW50b25seTEyMzQ1Njc4OTA=" > /tmp/mongo-keyfile &&
      chmod 400 /tmp/mongo-keyfile &&
      chown mongodb:mongodb /tmp/mongo-keyfile &&
      exec mongod --replSet rs0 --bind_ip_all --keyFile /tmp/mongo-keyfile'

  # Secondary Node 1
  mongo2:
    container_name: mongo2
    image: mongo:latest
    restart: unless-stopped
    networks:
      - distributed-network
    ports:
      - "27018:27017"
    volumes:
      - ./mongodb/data2:/data/db
    command: >
      bash -c 'echo "dGhpc2lzYWZha2VrZXlmb3Jsb2NhbGRldmVsb3BtZW50b25seTEyMzQ1Njc4OTA=" > /tmp/mongo-keyfile &&
      chmod 400 /tmp/mongo-keyfile &&
      chown mongodb:mongodb /tmp/mongo-keyfile &&
      exec mongod --replSet rs0 --bind_ip_all --keyFile /tmp/mongo-keyfile'

  # Secondary Node 2
  mongo3:
    container_name: mongo3
    image: mongo:latest
    restart: unless-stopped
    networks:
      - distributed-network
    ports:
      - "27019:27017"
    volumes:
      - ./mongodb/data3:/data/db
    command: >
      bash -c 'echo "dGhpc2lzYWZha2VrZXlmb3Jsb2NhbGRldmVsb3BtZW50b25seTEyMzQ1Njc4OTA=" > /tmp/mongo-keyfile &&
      chmod 400 /tmp/mongo-keyfile &&
      chown mongodb:mongodb /tmp/mongo-keyfile &&
      exec mongod --replSet rs0 --bind_ip_all --keyFile /tmp/mongo-keyfile'

  # Initialization Service
  mongo-init:
    container_name: mongo-init
    image: mongo:latest
    network_mode: "service:mongo1"
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    command: >
      bash -c "
      echo 'Waiting for MongoDB to start...';
      until mongosh --host localhost:27017 --eval 'db.adminCommand(\"ping\")' --quiet; do
        sleep 2;
      done;
      
      echo 'Initiating replica set...';
      mongosh --host localhost:27017 --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo1:27017\"}, {_id: 1, host: \"mongo2:27017\"}, {_id: 2, host: \"mongo3:27017\"}]})' --quiet;
      
      echo 'Waiting for primary election...';
      sleep 10;
      
      echo 'Creating admin user...';
      mongosh --host localhost:27017 --eval 'db.getSiblingDB(\"admin\").createUser({user: \"admin\", pwd: \"password\", roles: [{role: \"root\", db: \"admin\"}]})' --quiet;
      
      echo 'Replica set initialized and secured successfully!';
      "

  broker:
    image: apache/kafka:latest
    hostname: broker
    container_name: broker
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:29092,EXTERNAL://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - distributed-network
    restart: unless-stopped
  
  notifications:
    build: ./email-service
    container_name: notifications
    pull_policy: build
    ports:
      - 8888:8888
    networks:
      - distributed-network


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports: 
      - 9090:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/prometheus_data:/prometheus:rw
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - distributed-network
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
     - 3333:3000
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - distributed-network
    restart: unless-stopped
    depends_on:
      - prometheus

  mongodb-exporter:
    image: percona/mongodb_exporter:0.48.0
    container_name: mongodb-exporter
    ports:
      - 9216:9216
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/?authSource=admin
    command:
      - '--mongodb.uri=mongodb://admin:password@mongo1:27017,mongo2:27017,mongo3:27017/admin?replicaSet=rs0'
      - '--discovering-mode'
      - '--collect-all'
    networks:
      - distributed-network
    restart: unless-stopped
    depends_on:
      mongo-init:
        condition: service_completed_successfully

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: nginx-exporter
    ports:
      - 9113:9113
    command:
      - '-nginx.scrape-uri=http://nginx:8080/basic_status'
    networks:
      - distributed-network
    restart: unless-stopped
    depends_on:
      - nginx
    
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - 9308:9308
    command:
      - '--kafka.server=broker:29092'
    networks:
      - distributed-network
    restart: unless-stopped
    depends_on:
      - broker

volumes:
  mongodb_data:
    driver: local

networks:
  distributed-network:



